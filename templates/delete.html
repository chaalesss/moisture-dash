<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Moisture-Dash: Delete</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
        <link rel="stylesheet" href="../static/bootstrap/css/bootstrap.min.css">
        <link rel="stylesheet" href="../static/css/cards.css">
        <link rel="stylesheet" href="../static/css/main.css">
    </head>
    
    <body>

        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand" href="{{url_for('index')}}">Moisture-Dash</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarScroll">
                    <ul class="navbar-nav nav-underline me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="{{url_for('add')}}">Add Plant</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{url_for('delete')}}">Remove Plant</a>
                        </li>
                    </ul>
                    <ul class="navbar-nav mb-2 ms-1 mb-lg-0" id="loginreg-btn">
                        <li class="nav-item">
                            <a class="btn btn-primary" href="{{url_for('login')}}">Login</a>
                            <a class="btn btn-success" href="{{url_for('register')}}">Register</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container-fluid py-5 px-4">
            <h1 class="mb-4 text-center">Moisture-Dash: Delete Plant</h1>
        </div>
        <div class="d-flex align-items-center">
            <div class="container py-4">
                <div class="text-center" id="starter-text">
                    <h2 class="my-5">It seems that you don't have any plants added yet, to get started, add a plant and it will show up here.</h2>
                    <a class="btn btn-lg btn-outline-info my-5" href="{{url_for('add')}}">Add Plant</a>
                </div>
                <div class="row justify-content-center" id="plant-grid">
                    <!-- Plant cards will be injected here -->
                </div>
            </div>
        </div>

        <div class="modal fade" id="delete-modal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content modal-transparent">

                    <div class="modal-header">
                        <h5 class="modal-title">Confirm Delete</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <p id="modal-text">Are you sure you want to delete this Plant? This action cannot be undone.</p>
                    </div>

                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-danger" id="confirm-delete-btn">Delete</button>
                    </div>

                </div>
            </div>
        </div>

        <div class="toast-container top-0 start-50 translate-middle-x p-3">
            <div id="delete-toast" class="toast text-bg-success" role="alert">
                <div class="d-flex">
                    <div id="toast-body" class="toast-body">
                        
                    </div>

                    <button
                        type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                    </button>
                </div>
            </div>
        </div>

        <script src="../static/bootstrap/js/bootstrap.bundle.min.js"></script>
        <script src="../static/js/user_handler.js"></script>
        <script src="../static/js/delete_plant.js"></script>
    </body>
</html>
