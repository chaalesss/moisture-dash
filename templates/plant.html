<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Moisture-Dash: {{ plant_name }}</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
        <link rel="stylesheet" href="../static/bootstrap/css/bootstrap.min.css">
        <link rel="stylesheet" href="../static/css/cards.css">
        <link rel="stylesheet" href="../static/css/charts.css">
        <link rel="stylesheet" href="../static/css/upload.css">
        <link rel="stylesheet" href="../static/css/main.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>

    <body
    data-plant-id="{{ plant_id }}"
    data-plant-image="{{ plant.image or '' }}">
    <!-- NAVBAR -->
        <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="{{url_for('index')}}">Moisture-Dash</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarScroll">
                    <ul class="navbar-nav nav-underline me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="{{url_for('add')}}">Add Plant</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{url_for('delete')}}">Remove Plant</a>
                        </li>
                    </ul>
                    <ul class="navbar-nav mb-2 ms-1 mb-lg-0" id="loginreg-btn">
                        <li class="nav-item">
                            <a class="btn btn-primary" href="{{url_for('login')}}">Login</a>
                            <a class="btn btn-success" href="{{url_for('register')}}">Register</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

<!-- MAIN CONTENT -->
<div class="container-fluid dashboard-container py-4 px-4">

    <div class="row dashboard-row g-4">

        <!-- LEFT COLUMN -->
        <div class="col-12 col-lg-4 h-100 d-flex flex-column">
            <div class="d-flex flex-column gap-4">

                <!-- Plant Info Card -->
                <div class="card shadow-sm flex-grow-1">
                    <div class="card-body my-5 overflow-auto">
                        <h2 id='plant-name' class="card-title text-center">Plant Name</h2>
                        <p id='plant-species' class="text-text text-center"><strong>Species:</strong> -----</p>

                        <br>

                        <h2 class="card-title text-center">Moisture Info</h2>
                        <p id="moisture-percent" class="card-text text-center" style="font-size: 22px;"><strong>Moisture:</strong> --%</p>
                        <p id="raw-value" class="card-text text-center"><strong>Raw Value:</strong> ---</p>
                        <p id="plant-status" class="card-text text-center">
                            <strong>Status:</strong>
                            <span class="badge bg-secondary">-----</span>
                        </p>
                        <p id="last-watered" class="card-text text-center"><strong>Last Watered:</strong> 18 June 2026</p>
                    </div>
                </div>
                <!-- Upload Card -->
                <div class="card shadow-sm upload-card d-flex">
                    <div class="card-body d-flex flex-column flex-grow-1">

                        <h5 class="card-title text-center">
                            Upload Plant Photo (Under development...)
                        </h5>

                        <div class="upload-container flex-grow-1 d-flex">
                            <label for="input-file" id="drop-area">
                                <input type="file" accept="image/*" name="image" id="input-file" hidden>
                                <div id="img-view">

                                    <!-- NO IMAGE STATE -->
                                    <div id="upload-placeholder" {% if plant.image %}class="d-none"{% endif %}>
                                        <i class="fa-solid fa-cloud-arrow-up fa-10x"></i>
                                        <p class="text-center">Drag and drop or click here<br>to add image</p>
                                    </div>

                                    <!-- IMAGE EXISTS STATE (no buttons here anymore) -->
                                    <div id="image-preview" {% if not plant.image %}class="d-none"{% endif %}>
                                        <img 
                                            id="plant-image-preview"
                                            src="{% if plant.image %}{{ url_for('static', filename='uploads/' + plant.image) }}{% endif %}"
                                            class="plant-image"
                                        >
                                    </div>

                                </div>
                            </label>
                        </div>

                        <!-- Buttons sit outside the drop area -->
                        <div id="image-buttons" class="d-flex gap-2 justify-content-center mt-2 {% if not plant.image %}d-none{% endif %}">
                            <button id="change-image" class="btn btn-primary" type="button">
                                <i class="fa-solid fa-pen"></i> Change
                            </button>
                            <button id="delete-image" class="btn btn-danger" type="button">
                                <i class="fa-solid fa-trash"></i> Delete
                            </button>
                        </div>

                    </div>
                </div>

            </div>
        </div>

        <!-- RIGHT COLUMN (CHART) -->
        <div class="col-12 col-lg-8">
            <div class="card shadow-sm h-100">

                <div class="card-body d-flex flex-column">

                    <h5 class="text-center">Moisture History (Only works on debug mode at the moment...)</h5>

                    <!-- Chart fills remaining height -->
                    <div class="flex-grow-1">
                        <canvas id="moisture-chart"></canvas>
                    </div>

                </div>

            </div>
        </div>

    </div>
</div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
        <script src="../static/bootstrap/js/bootstrap.bundle.min.js"></script>
        <script src="../static/js/user_handler.js"></script>
        <script src="../static/js/charts.js"></script>
        <script src="../static/js/plant_single.js"></script>
        <script src="../static/js/img_upload.js"></script>
    </body>
</html>
